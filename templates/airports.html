<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Search &mdash; ASK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/theme.css">
    <script>(function(){var t=localStorage.getItem('ask-theme')||'system';var r=t==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):t;document.documentElement.setAttribute('data-theme',r)})();</script>
    <style>
        .search-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .form-group input[type="text"] { width: 280px; }
        .form-group select { width: 280px; }

        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-top: 24px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .results-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .results-header h2 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
        }
        .results-count {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }
        .results-body { overflow-x: auto; }
        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 48px 24px;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .search-row { flex-direction: column; align-items: stretch; }
            .form-group input[type="text"],
            .form-group select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-brand"><span class="topbar-logo">ASK</span><span class="topbar-title">Airport Swiss Knife</span></a>
        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
            <button class="theme-btn" data-theme="system" title="System theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
            <button class="theme-btn" data-theme="dark" title="Dark theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <a href="/" class="back-link">&larr; Back to Home</a>
            <h1>Airport Search</h1>
        </div>

        <div class="card">
            <form id="searchForm">
                <div class="search-row">
                    <div class="form-group">
                        <label for="airportName">Airport Name</label>
                        <input type="text" id="airportName" name="name" placeholder="Enter airport name..." required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" name="country">
                            <option value="ALL">All Countries</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="searchButton">Search</button>
                    </div>
                </div>
                <div class="loading-msg" id="countryLoading">Loading countries...</div>
                <div class="error-msg" id="countryError">Error loading countries</div>
                <div class="loading-msg" id="searchLoading">Searching...</div>
                <div class="error-msg" id="searchError"></div>
            </form>
        </div>

        <div id="results" style="display:none;">
            <div class="results-card">
                <div class="results-header">
                    <h2>Results</h2>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                <div class="results-body" id="resultsTable"></div>
            </div>
        </div>
    </div>

    <script src="/static/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCountries();
        });

        async function loadCountries() {
            const countrySelect = document.getElementById('country');
            const countryLoading = document.getElementById('countryLoading');
            const countryError = document.getElementById('countryError');

            countryLoading.style.display = 'block';
            countryError.style.display = 'none';

            try {
                const response = await fetch('/api/country');
                if (!response.ok) throw new Error('Failed to load countries');

                const data = await response.json();
                countrySelect.innerHTML = '<option value="ALL">All Countries</option>';

                data.countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.code;
                    option.textContent = country.name;
                    countrySelect.appendChild(option);
                });

                countryLoading.style.display = 'none';
            } catch (error) {
                console.error('Error loading countries:', error);
                countryLoading.style.display = 'none';
                countryError.style.display = 'block';
            }
        }

        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const airportName = document.getElementById('airportName').value.trim();
            const country = document.getElementById('country').value;
            const searchButton = document.getElementById('searchButton');
            const searchLoading = document.getElementById('searchLoading');
            const searchError = document.getElementById('searchError');
            const results = document.getElementById('results');

            if (!airportName) {
                searchError.textContent = 'Please enter an airport name';
                searchError.style.display = 'block';
                return;
            }

            searchButton.disabled = true;
            searchLoading.style.display = 'block';
            searchError.style.display = 'none';
            results.style.display = 'none';

            try {
                let apiUrl = `/api/airport/search?name=${encodeURIComponent(airportName)}`;
                if (country !== 'ALL') {
                    apiUrl += `&country=${encodeURIComponent(country)}`;
                }

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Search failed');

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Error searching airports:', error);
                searchError.textContent = 'Error searching airports. Please try again.';
                searchError.style.display = 'block';
            } finally {
                searchButton.disabled = false;
                searchLoading.style.display = 'none';
            }
        });

        function displayResults(data) {
            const results = document.getElementById('results');
            const resultsCount = document.getElementById('resultsCount');
            const resultsTable = document.getElementById('resultsTable');

            resultsCount.textContent = data.count + ' airport(s)';

            if (data.count === 0) {
                resultsTable.innerHTML = '<div class="no-results">No airports found matching your criteria.</div>';
            } else {
                let tableHTML = '<table><thead><tr>' +
                    '<th>Name</th><th>IATA</th><th>ICAO</th><th>City</th><th>Country</th><th>Type</th><th>Elevation (ft)</th>' +
                    '</tr></thead><tbody>';

                data.airports.forEach(airport => {
                    tableHTML += '<tr>' +
                        '<td><strong>' + escapeHtml(airport.name || 'N/A') + '</strong></td>' +
                        '<td>' + escapeHtml(airport.iata_code || 'N/A') + '</td>' +
                        '<td>' + escapeHtml(airport.icao_code || 'N/A') + '</td>' +
                        '<td>' + escapeHtml(airport.municipality || 'N/A') + '</td>' +
                        '<td>' + escapeHtml(airport.iso_country || 'N/A') + '</td>' +
                        '<td>' + escapeHtml(airport.type || 'N/A') + '</td>' +
                        '<td>' + (airport.elevation_ft || 'N/A') + '</td>' +
                        '</tr>';
                });

                tableHTML += '</tbody></table>';
                resultsTable.innerHTML = tableHTML;
            }

            results.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
