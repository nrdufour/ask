<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Calculator &mdash; ASK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/theme.css">
    <script>(function(){var t=localStorage.getItem('ask-theme')||'system';var r=t==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):t;document.documentElement.setAttribute('data-theme',r)})();</script>
    <style>
        .form-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .form-group input[type="text"] {
            width: 200px;
            text-transform: uppercase;
        }

        .results-section {
            display: none;
            margin-top: 24px;
        }

        .distance-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .distance-banner .label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .distance-value {
            font-size: 2.75rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.03em;
            font-family: 'JetBrains Mono', monospace;
        }
        .distance-unit {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }

        .airport-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .airport-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .airport-card h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--accent);
            margin: 0 0 12px;
        }
        .airport-detail {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.8125rem;
        }
        .airport-label { color: var(--text-secondary); font-weight: 500; }
        .airport-value {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .map-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        #map { height: 400px; }

        @media (max-width: 768px) {
            .form-row { flex-direction: column; align-items: stretch; }
            .form-group input[type="text"] { width: 100%; }
            .airport-grid { grid-template-columns: 1fr; }
            .distance-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-brand"><span class="topbar-logo">ASK</span><span class="topbar-title">Airport Swiss Knife</span></a>
        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
            <button class="theme-btn" data-theme="system" title="System theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
            <button class="theme-btn" data-theme="dark" title="Dark theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <a href="/" class="back-link">&larr; Back to Home</a>
            <h1>Distance Calculator</h1>
        </div>

        <div class="card">
            <form id="distanceForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="departure">Departure (ICAO)</label>
                        <input type="text" id="departure" name="departure" placeholder="e.g., KJFK" maxlength="4" required>
                    </div>
                    <div class="form-group">
                        <label for="destination">Destination (ICAO)</label>
                        <input type="text" id="destination" name="destination" placeholder="e.g., EGLL" maxlength="4" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="calculateButton">Calculate</button>
                    </div>
                </div>
                <div class="loading-msg" id="loading">Calculating distance...</div>
                <div class="error-msg" id="error"></div>
            </form>
        </div>

        <div class="results-section" id="results">
            <div class="distance-banner">
                <div class="label">Distance between airports</div>
                <span class="distance-value" id="distanceValue">0</span><span class="distance-unit">NM</span>
            </div>

            <div class="airport-grid" id="airportInfo"></div>

            <div class="map-card">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/theme.js"></script>
    <script>
        let map = null;

        document.getElementById('departure').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });
        document.getElementById('destination').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        document.getElementById('distanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const departure = document.getElementById('departure').value.trim();
            const destination = document.getElementById('destination').value.trim();
            const calculateButton = document.getElementById('calculateButton');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            if (!departure || !destination) {
                error.textContent = 'Please enter both departure and destination ICAO codes';
                error.style.display = 'block';
                return;
            }
            if (departure.length !== 4 || destination.length !== 4) {
                error.textContent = 'ICAO codes must be exactly 4 characters long';
                error.style.display = 'block';
                return;
            }
            if (departure === destination) {
                error.textContent = 'Departure and destination airports cannot be the same';
                error.style.display = 'block';
                return;
            }

            calculateButton.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            results.style.display = 'none';

            try {
                const apiUrl = `/api/airport/distance?departure=${encodeURIComponent(departure)}&destination=${encodeURIComponent(destination)}`;
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Distance calculation failed');
                }
                const data = await response.json();
                displayResults(data);
            } catch (err) {
                console.error('Error calculating distance:', err);
                error.textContent = err.message || 'Error calculating distance. Please try again.';
                error.style.display = 'block';
            } finally {
                calculateButton.disabled = false;
                loading.style.display = 'none';
            }
        });

        function displayResults(data) {
            const results = document.getElementById('results');
            document.getElementById('distanceValue').textContent = Math.round(data.distance_nm);

            document.getElementById('airportInfo').innerHTML =
                '<div class="airport-card">' +
                    '<h3>Departure</h3>' +
                    '<div class="airport-detail"><span class="airport-label">Name</span><span class="airport-value">' + escapeHtml(data.departure_airport.name) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">ICAO</span><span class="airport-value">' + escapeHtml(data.departure_airport.icao_code) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">IATA</span><span class="airport-value">' + escapeHtml(data.departure_airport.iata_code || 'N/A') + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">City</span><span class="airport-value">' + escapeHtml(data.departure_airport.municipality || 'N/A') + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">Country</span><span class="airport-value">' + escapeHtml(data.departure_airport.iso_country) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">Coordinates</span><span class="airport-value">' + data.departure_airport.latitude_deg.toFixed(4) + ', ' + data.departure_airport.longitude_deg.toFixed(4) + '</span></div>' +
                '</div>' +
                '<div class="airport-card">' +
                    '<h3>Destination</h3>' +
                    '<div class="airport-detail"><span class="airport-label">Name</span><span class="airport-value">' + escapeHtml(data.destination_airport.name) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">ICAO</span><span class="airport-value">' + escapeHtml(data.destination_airport.icao_code) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">IATA</span><span class="airport-value">' + escapeHtml(data.destination_airport.iata_code || 'N/A') + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">City</span><span class="airport-value">' + escapeHtml(data.destination_airport.municipality || 'N/A') + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">Country</span><span class="airport-value">' + escapeHtml(data.destination_airport.iso_country) + '</span></div>' +
                    '<div class="airport-detail"><span class="airport-label">Coordinates</span><span class="airport-value">' + data.destination_airport.latitude_deg.toFixed(4) + ', ' + data.destination_airport.longitude_deg.toFixed(4) + '</span></div>' +
                '</div>';

            initializeMap(data);
            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });
        }

        function initializeMap(data) {
            if (map) { map.remove(); map = null; }

            setTimeout(function() {
                var centerLat = (data.departure_airport.latitude_deg + data.destination_airport.latitude_deg) / 2;
                var centerLng = (data.departure_airport.longitude_deg + data.destination_airport.longitude_deg) / 2;

                map = L.map('map', {
                    center: [centerLat, centerLng],
                    zoom: 4,
                    zoomControl: true,
                    scrollWheelZoom: true
                });

                L.tileLayer(window.askTheme.getTileUrl(), {
                    attribution: window.askTheme.getTileAttribution(),
                    maxZoom: 19
                }).addTo(map);

                var depIcon = L.divIcon({
                    html: '<div style="background:#2563eb;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:13px;font-family:Outfit,sans-serif;">D</div>',
                    iconSize: [30, 30], iconAnchor: [15, 15], className: ''
                });
                var destIcon = L.divIcon({
                    html: '<div style="background:#16a34a;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:13px;font-family:Outfit,sans-serif;">A</div>',
                    iconSize: [30, 30], iconAnchor: [15, 15], className: ''
                });

                var depMarker = L.marker([data.departure_airport.latitude_deg, data.departure_airport.longitude_deg], {icon: depIcon})
                    .bindPopup('<strong>' + escapeHtml(data.departure_airport.name) + '</strong><br>' +
                        escapeHtml(data.departure_airport.icao_code) + ' / ' + escapeHtml(data.departure_airport.iata_code || 'N/A') + '<br>' +
                        escapeHtml(data.departure_airport.municipality || '') + ', ' + escapeHtml(data.departure_airport.iso_country),
                        {maxWidth: 260}).addTo(map);

                var destMarker = L.marker([data.destination_airport.latitude_deg, data.destination_airport.longitude_deg], {icon: destIcon})
                    .bindPopup('<strong>' + escapeHtml(data.destination_airport.name) + '</strong><br>' +
                        escapeHtml(data.destination_airport.icao_code) + ' / ' + escapeHtml(data.destination_airport.iata_code || 'N/A') + '<br>' +
                        escapeHtml(data.destination_airport.municipality || '') + ', ' + escapeHtml(data.destination_airport.iso_country),
                        {maxWidth: 260}).addTo(map);

                var gcPoints = calculateGreatCirclePoints(
                    data.departure_airport.latitude_deg, data.departure_airport.longitude_deg,
                    data.destination_airport.latitude_deg, data.destination_airport.longitude_deg, 100
                );

                var line = L.polyline(gcPoints, {
                    color: '#2563eb', weight: 2.5, opacity: 0.7, dashArray: '8, 5'
                }).addTo(map);

                var midIdx = Math.floor(gcPoints.length / 2);
                var distLabel = L.divIcon({
                    html: '<div style="background:#2563eb;color:#fff;padding:4px 10px;border-radius:12px;font-weight:600;font-size:12px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);white-space:nowrap;font-family:JetBrains Mono,monospace;">' + Math.round(data.distance_nm) + ' NM</div>',
                    iconSize: [0, 0], iconAnchor: [0, 0], className: ''
                });
                L.marker(gcPoints[midIdx], {icon: distLabel}).addTo(map);

                var group = new L.featureGroup([depMarker, destMarker, line]);
                map.fitBounds(group.getBounds().pad(0.15));
                setTimeout(function() { map.invalidateSize(); }, 100);
            }, 100);
        }

        function calculateGreatCirclePoints(lat1, lng1, lat2, lng2, numPoints) {
            var points = [];
            var phi1 = lat1 * Math.PI / 180;
            var phi2 = lat2 * Math.PI / 180;
            var deltaLambda = (lng2 - lng1) * Math.PI / 180;

            var a = Math.sin((phi2 - phi1) / 2) * Math.sin((phi2 - phi1) / 2) +
                Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
            var angDist = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            for (var i = 0; i <= numPoints; i++) {
                var f = i / numPoints;
                if (f === 0) { points.push([lat1, lng1]); continue; }
                if (f === 1) { points.push([lat2, lng2]); continue; }

                var A = Math.sin((1 - f) * angDist) / Math.sin(angDist);
                var B = Math.sin(f * angDist) / Math.sin(angDist);
                var x = A * Math.cos(phi1) * Math.cos(lng1 * Math.PI / 180) + B * Math.cos(phi2) * Math.cos(lng2 * Math.PI / 180);
                var y = A * Math.cos(phi1) * Math.sin(lng1 * Math.PI / 180) + B * Math.cos(phi2) * Math.sin(lng2 * Math.PI / 180);
                var z = A * Math.sin(phi1) + B * Math.sin(phi2);
                points.push([Math.atan2(z, Math.sqrt(x*x + y*y)) * 180 / Math.PI, Math.atan2(y, x) * 180 / Math.PI]);
            }
            return points;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
