<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reachable Airports &mdash; ASK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/theme.css">
    <script>(function(){var t=localStorage.getItem('ask-theme')||'system';var r=t==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):t;document.documentElement.setAttribute('data-theme',r)})();</script>
    <style>
        .form-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .form-group input[type="text"] {
            width: 140px;
            text-transform: uppercase;
        }
        .form-group input[type="number"] { width: 160px; }

        .filter-section {
            margin-bottom: 8px;
        }
        .filter-section label {
            margin-bottom: 8px;
        }

        .results-section {
            display: none;
            margin-top: 24px;
        }
        .summary {
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }
        .map-sidebar {
            display: flex;
            gap: 16px;
            height: 550px;
        }
        .map-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        #map {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        .sidebar {
            width: 350px;
            overflow-y: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .sidebar-list {
            padding: 8px;
        }
        .sidebar-item {
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background-color 0.1s ease;
            border: 1px solid transparent;
        }
        .sidebar-item:hover {
            background: var(--accent-subtle);
            border-color: var(--border);
        }
        .sidebar-item .name {
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .sidebar-item .codes {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .sidebar-item .dist {
            font-size: 0.8125rem;
            color: var(--accent);
            font-weight: 600;
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .form-row { flex-direction: column; align-items: stretch; }
            .form-group input[type="text"],
            .form-group input[type="number"] { width: 100%; }
            .map-sidebar {
                flex-direction: column;
                height: auto;
            }
            .map-card { min-height: 350px; }
            #map { min-height: 350px; }
            .sidebar {
                width: auto;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-brand"><span class="topbar-logo">ASK</span><span class="topbar-title">Airport Swiss Knife</span></a>
        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
            <button class="theme-btn" data-theme="system" title="System theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
            <button class="theme-btn" data-theme="dark" title="Dark theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <a href="/" class="back-link">&larr; Back to Home</a>
            <h1>Reachable Airports</h1>
        </div>

        <div class="card">
            <form id="reachableForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="icao">Origin (ICAO)</label>
                        <input type="text" id="icao" name="icao" placeholder="e.g., LFPG" maxlength="4" required>
                    </div>
                    <div class="form-group">
                        <label for="range">Range (NM)</label>
                        <input type="number" id="range" name="range" placeholder="e.g., 500" min="1" max="10800" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="searchButton">Search</button>
                    </div>
                </div>
                <div class="filter-section">
                    <label>Airport Types</label>
                    <div class="type-chips" id="typeChips">
                        <span class="type-chip active" data-type="large_airport">Large</span>
                        <span class="type-chip active" data-type="medium_airport">Medium</span>
                        <span class="type-chip" data-type="small_airport">Small</span>
                        <span class="type-chip" data-type="heliport">Heliport</span>
                        <span class="type-chip" data-type="seaplane_base">Seaplane Base</span>
                        <span class="type-chip" data-type="closed">Closed</span>
                        <span class="type-chip" data-type="balloonport">Balloonport</span>
                    </div>
                </div>
                <div class="loading-msg" id="loading">Searching for reachable airports...</div>
                <div class="error-msg" id="error"></div>
            </form>
        </div>

        <div class="results-section" id="results">
            <div class="summary" id="summary"></div>
            <div class="map-sidebar">
                <div class="map-card">
                    <div id="map"></div>
                </div>
                <div class="sidebar">
                    <div class="sidebar-header">Reachable Airports</div>
                    <div class="sidebar-list" id="airportList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/theme.js"></script>
    <script>
        let map = null;
        let markers = [];

        document.getElementById('icao').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        document.querySelectorAll('.type-chip').forEach(function(chip) {
            chip.addEventListener('click', function() {
                chip.classList.toggle('active');
            });
        });

        function getSelectedTypes() {
            var selected = [];
            document.querySelectorAll('.type-chip.active').forEach(function(chip) {
                selected.push(chip.getAttribute('data-type'));
            });
            return selected;
        }

        document.getElementById('reachableForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const icao = document.getElementById('icao').value.trim();
            const range = document.getElementById('range').value.trim();
            const searchButton = document.getElementById('searchButton');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            if (!icao || !range) {
                error.textContent = 'Please enter both an ICAO code and a range';
                error.style.display = 'block';
                return;
            }
            if (icao.length !== 4) {
                error.textContent = 'ICAO code must be exactly 4 characters';
                error.style.display = 'block';
                return;
            }
            const rangeNum = parseFloat(range);
            if (isNaN(rangeNum) || rangeNum <= 0 || rangeNum > 10800) {
                error.textContent = 'Range must be between 1 and 10800 NM';
                error.style.display = 'block';
                return;
            }

            searchButton.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            results.style.display = 'none';

            try {
                var apiUrl = `/api/airport/reachable?icao=${encodeURIComponent(icao)}&range=${encodeURIComponent(range)}`;
                const selectedTypes = getSelectedTypes();
                if (selectedTypes.length > 0) {
                    apiUrl += '&type=' + encodeURIComponent(selectedTypes.join(','));
                }
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Search failed');
                }
                const data = await response.json();
                displayResults(data);
            } catch (err) {
                console.error('Error:', err);
                error.textContent = err.message || 'Error searching for airports. Please try again.';
                error.style.display = 'block';
            } finally {
                searchButton.disabled = false;
                loading.style.display = 'none';
            }
        });

        function displayResults(data) {
            const results = document.getElementById('results');
            const summary = document.getElementById('summary');

            var selectedTypes = getSelectedTypes();
            var filterText = selectedTypes.length > 0
                ? ' (filtered: ' + selectedTypes.map(function(t) { return t.replace('_', ' '); }).join(', ') + ')'
                : ' (all types)';
            summary.innerHTML = 'Found <strong>' + data.count + '</strong> airports within <strong>' +
                data.range_nm + ' NM</strong> of <strong>' + escapeHtml(data.origin_airport.icao_code) +
                '</strong> (' + escapeHtml(data.origin_airport.name) + ')' + filterText;

            buildSidebar(data);
            initializeMap(data);

            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });
        }

        function buildSidebar(data) {
            const list = document.getElementById('airportList');
            list.innerHTML = '';

            if (data.airports === null || data.airports.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:24px 16px;font-size:0.8125rem;">No airports found in range.</p>';
                return;
            }

            data.airports.forEach(function(item, idx) {
                const ap = item.airport;
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.innerHTML =
                    '<div class="name">' + escapeHtml(ap.name) + '</div>' +
                    '<div class="codes">' + escapeHtml(ap.icao_code || '-') + ' / ' + escapeHtml(ap.iata_code || '-') +
                    (ap.municipality ? ' &middot; ' + escapeHtml(ap.municipality) : '') + '</div>' +
                    '<div class="dist">' + item.distance_nm + ' NM</div>';
                div.addEventListener('click', function() { panToMarker(idx); });
                list.appendChild(div);
            });
        }

        function panToMarker(idx) {
            if (markers[idx]) {
                map.setView(markers[idx].getLatLng(), Math.max(map.getZoom(), 8));
                markers[idx].openPopup();
            }
        }

        function initializeMap(data) {
            if (map) { map.remove(); map = null; }
            markers = [];

            setTimeout(function() {
                map = L.map('map', {
                    center: [data.origin_airport.latitude_deg, data.origin_airport.longitude_deg],
                    zoom: 6,
                    zoomControl: true,
                    scrollWheelZoom: true
                });

                L.tileLayer(window.askTheme.getTileUrl(), {
                    attribution: window.askTheme.getTileAttribution(),
                    maxZoom: 19
                }).addTo(map);

                L.circle([data.origin_airport.latitude_deg, data.origin_airport.longitude_deg], {
                    radius: data.range_nm * 1852,
                    color: '#2563eb',
                    weight: 2,
                    dashArray: '8, 6',
                    fillColor: '#2563eb',
                    fillOpacity: 0.04,
                    interactive: false
                }).addTo(map);

                var originIcon = L.divIcon({
                    html: '<div style="background:#2563eb;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:14px;font-family:Outfit,sans-serif;">O</div>',
                    iconSize: [32, 32], iconAnchor: [16, 16], className: ''
                });

                L.marker([data.origin_airport.latitude_deg, data.origin_airport.longitude_deg], { icon: originIcon })
                    .bindPopup(
                        '<strong>' + escapeHtml(data.origin_airport.name) + '</strong><br>' +
                        escapeHtml(data.origin_airport.icao_code) + ' / ' + escapeHtml(data.origin_airport.iata_code || 'N/A') + '<br>' +
                        escapeHtml(data.origin_airport.municipality || '') + ', ' + escapeHtml(data.origin_airport.iso_country),
                        { maxWidth: 260 })
                    .addTo(map);

                if (data.airports) {
                    data.airports.forEach(function(item, idx) {
                        var ap = item.airport;
                        var marker = L.circleMarker([ap.latitude_deg, ap.longitude_deg], {
                            radius: 6,
                            fillColor: '#16a34a',
                            color: '#fff',
                            weight: 1.5,
                            fillOpacity: 0.85
                        }).bindPopup(
                            '<strong>' + escapeHtml(ap.name) + '</strong><br>' +
                            escapeHtml(ap.icao_code || 'N/A') + ' / ' + escapeHtml(ap.iata_code || 'N/A') + '<br>' +
                            escapeHtml(ap.municipality || '') + ', ' + escapeHtml(ap.iso_country) + '<br>' +
                            '<strong>' + item.distance_nm + ' NM</strong>',
                            { maxWidth: 260 }
                        ).addTo(map);
                        markers.push(marker);
                    });
                }

                var latDelta = data.range_nm / 60;
                var cosLat = Math.cos(data.origin_airport.latitude_deg * Math.PI / 180);
                var lonDelta = data.range_nm / (60 * Math.max(cosLat, 0.01));
                map.fitBounds([
                    [data.origin_airport.latitude_deg - latDelta, data.origin_airport.longitude_deg - lonDelta],
                    [data.origin_airport.latitude_deg + latDelta, data.origin_airport.longitude_deg + lonDelta]
                ], { padding: [30, 30] });

                setTimeout(function() { map.invalidateSize(); }, 100);
            }, 100);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
